        // ==========================================

        function ImposterGame({ onBack }) { /* هەمان کۆدی پێشوو بەبێ گۆڕانکاری گەورە، کورتکراوەتەوە بۆ ئاسانی */
            const [view, setView] = useState('HOME');
            const [players, setPlayers] = useState([{ id: 1, name: 'یاریزان 1', role: '', word: '', isEliminated: false }, { id: 2, name: 'یاریزان 2', role: '', word: '', isEliminated: false }, { id: 3, name: 'یاریزان 3', role: '', word: '', isEliminated: false }]);
            const [numImposters, setNumImposters] = useState(1);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [showSecret, setShowSecret] = useState(false);
            const [citizenWord, setCitizenWord] = useState('');
            const [imposterWord, setImposterWord] = useState('');
            const [lastEliminated, setLastEliminated] = useState(null);
            const [winner, setWinner] = useState(null);

            const startGame = () => {
                const randomPair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
                const isFirstCitizen = Math.random() > 0.5;
                const cWord = isFirstCitizen ? randomPair[0] : randomPair[1];
                const iWord = isFirstCitizen ? randomPair[1] : randomPair[0];
                setCitizenWord(cWord); setImposterWord(iWord);
                let shuffledPlayers = [...players].sort(() => 0.5 - Math.random());
                let newPlayers = shuffledPlayers.map((p, index) => ({ ...p, role: index < numImposters ? 'imposter' : 'citizen', word: index < numImposters ? iWord : cWord, isEliminated: false }));
                setPlayers(newPlayers.sort((a, b) => a.id - b.id));
                setCurrentPlayerIdx(0); setShowSecret(false); setWinner(null); setView('PASS');
            };

            const handleVote = (id) => {
                const updated = players.map(p => p.id === id ? { ...p, isEliminated: true } : p);
                setPlayers(updated); setLastEliminated(updated.find(p => p.id === id));
                const rImp = updated.filter(p => p.role === 'imposter' && !p.isEliminated).length;
                const rCit = updated.filter(p => p.role === 'citizen' && !p.isEliminated).length;
                if (rImp === 0) { setWinner('citizens'); setView('GAME_OVER'); } 
                else if (rImp >= rCit) { setWinner('imposters'); setView('GAME_OVER'); } 
                else { setView('ROUND_RESULT'); }
            };

            return (
                <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20">
                    <div className="p-4 bg-black/20 flex justify-between items-center border-b border-white/10">
                        <h2 className="text-2xl font-black text-pink-400">کێ فێڵبازە؟</h2>
                        <button onClick={onBack} className="bg-white/10 p-2 rounded-xl text-white"><Home size={24} /></button>
                    </div>
                    {view === 'HOME' && (
                        <div className="p-6 md:p-8 text-white">
                            <button onClick={() => setPlayers([...players, { id: Date.now(), name: `یاریزان ${players.length + 1}` }])} className="mb-4 bg-pink-600 px-4 py-2 rounded-full">+ زیادکردن</button>
                            <div className="space-y-2 mb-4 max-h-60 overflow-auto">
                                {players.map((p, i) => (
                                    <input key={p.id} value={p.name} onChange={(e) => setPlayers(players.map(x => x.id === p.id ? {...x, name: e.target.value} : x))} className="w-full bg-black/20 p-2 rounded-xl text-white" />
                                ))}
                            </div>
                            <button onClick={startGame} className="w-full bg-green-500 text-white text-2xl font-black py-4 rounded-2xl">دەستپێکردن</button>
                        </div>
                    )}
                    {view === 'PASS' && (
                        <div className="p-8 text-center">
                            <h2 className="text-4xl text-yellow-300 mb-8">{players[currentPlayerIdx].name}</h2>
                            {showSecret ? <h1 className="text-5xl text-white mb-8">{players[currentPlayerIdx].word}</h1> : <ShieldAlert size={64} className="mx-auto text-purple-300 mb-8" />}
                            <button onClick={() => showSecret ? (currentPlayerIdx + 1 < players.length ? (setCurrentPlayerIdx(currentPlayerIdx+1), setShowSecret(false)) : setView('DISCUSS')) : setShowSecret(true)} className="w-full bg-pink-500 py-4 rounded-2xl text-white text-xl font-bold">{showSecret ? 'داهاتوو' : 'نیشانبدە'}</button>
                        </div>
                    )}
                    {view === 'DISCUSS' && (
                        <div className="p-8 text-center"><h2 className="text-4xl text-white mb-8">کاتی گفتوگۆیە!</h2><button onClick={() => setView('VOTE')} className="w-full bg-red-500 py-4 rounded-2xl text-white text-xl font-bold">دەنگدان</button></div>

                    {view === 'VOTE' && (
                        <div className="p-8 grid grid-cols-2 gap-4">
                            {players.filter(p => !p.isEliminated).map(p => (
                                <button key={p.id} onClick={() => handleVote(p.id)} className="bg-black/20 text-white p-4 rounded-xl font-bold">{p.name}</button>
                            ))}
                        </div>
                    )}
                    {view === 'ROUND_RESULT' && (
                        <div className="p-8 text-center"><h2 className="text-3xl text-white mb-4">{lastEliminated?.name} دەرکرا!</h2><button onClick={() => setView('DISCUSS')} className="w-full bg-blue-500 py-4 rounded-2xl text-white font-bold">بەردەوام بە</button></div>

                    {view === 'GAME_OVER' && (

                    )}
                </div>

        }

        function TimeBombGame({ onBack }) {
            const [view, setView] = useState('HOME');
            const [category, setCategory] = useState('');
            const [timer, setTimer] = useState(0);

            const startGame = () => {
                setCategory(BOMB_CATEGORIES[Math.floor(Math.random() * BOMB_CATEGORIES.length)]);
                setTimer(Math.floor(Math.random() * 20) + 20); 
                setView('PLAYING');
            };

            useEffect(() => {
                let t;
                if (view === 'PLAYING' && timer > 0) t = setTimeout(() => setTimer(timer - 1), 1000);
                else if (view === 'PLAYING' && timer <= 0) setView('BOOM');
                return () => clearTimeout(t);
            }, [view, timer]);

            return (
                <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20">
                    <div className="p-4 bg-black/20 flex justify-between items-center border-b border-white/10">

                        <button onClick={onBack} className="bg-white/10 p-2 rounded-xl text-white"><Home size={24} /></button>
                    </div>
                    {view === 'HOME' && (
                        <div className="p-8 text-center flex flex-col justify-center items-center">
                            <Bomb size={80} className="text-red-500 mb-6 animate-pulse-fast" />
                            <p className="text-white mb-8">وەڵام بدەرەوە و خێرا مۆبایلەکە بدە بە کەسی تەنیشتت پێش ئەوەی بتەقێتەوە!</p>
                            <button onClick={startGame} className="w-full bg-red-500 text-white text-2xl font-black py-4 rounded-2xl">دەستپێکردن</button>
                        </div>
                    )}
                    {view === 'PLAYING' && (
                        <div className={`p-8 text-center flex flex-col justify-center items-center transition-colors ${timer < 6 ? 'bg-red-900/50' : ''}`}>
                            <div className={`text-6xl font-black mb-6 ${timer < 6 ? 'text-red-500 animate-bounce' : 'text-orange-400'}`}>{timer}</div>
                            <h2 className="text-4xl font-black text-yellow-300 mb-12">{category}</h2>
                            <button onClick={() => setCategory(BOMB_CATEGORIES[Math.floor(Math.random() * BOMB_CATEGORIES.length)])} className="w-full bg-green-500 active:scale-95 text-white text-3xl font-black py-8 rounded-3xl">خێرا بیدە بە کەسی تر!</button>
                        </div>
                    )}
                    {view === 'BOOM' && (
                        <div className="p-8 text-center bg-red-600">
                            <h2 className="text-6xl font-black text-white mb-8">تەقییەوە! 💥</h2>
                            <button onClick={startGame} className="w-full bg-white text-red-600 text-2xl font-black py-4 rounded-2xl">یارییەکی تر</button>
                        </div>
                    )}
                </div>
            );
        }

        // ٥. یاری: شەڕی پەنجەکان (نوێکراوە بۆ ٦ کەس)
        function FingerBattleGame({ onBack }) {
            const [view, setView] = useState('HOME');
            const [playerCount, setPlayerCount] = useState(2);
            const [scores, setScores] = useState([0, 0, 0, 0, 0, 0]); 
            const [winner, setWinner] = useState(null);
            const winScore = 50; 

            const colors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400', 'bg-purple-500', 'bg-orange-500'];
            const activeColors = ['active:bg-red-400', 'active:bg-blue-400', 'active:bg-green-400', 'active:bg-yellow-300', 'active:bg-purple-400', 'active:bg-orange-400'];

            const startGame = () => {
                setScores([0, 0, 0, 0, 0, 0]);
                setWinner(null);
                setView('PLAYING');
            };

            const handleTap = (index) => {
                if (view !== 'PLAYING' || winner !== null) return;
                setScores(prev => {
                    const newScores = [...prev];
                    newScores[index] += 1;
                    if (newScores[index] >= winScore) {
                        setWinner(index);
                        setView('GAME_OVER');
                    }
                    return newScores;
                });
            };

            // دیاریکردنی شێوازی دابەشبوونی شاشەکە بەپێی ژمارەی یاریزانەکان
            const gridClass = playerCount === 2 ? 'grid-cols-1 grid-rows-2' : 
                              playerCount <= 4 ? 'grid-cols-2 grid-rows-2' : 
                              'grid-cols-2 grid-rows-3';

            return (
                <div className="w-full h-[80vh] md:h-[700px] max-w-3xl mx-auto bg-black rounded-3xl shadow-2xl overflow-hidden border-4 border-white/20 relative">
                    {view === 'HOME' && (
                        <div className="absolute inset-0 z-20 bg-slate-900 p-8 text-center flex flex-col justify-center items-center">
                            <Hand size={80} className="text-blue-400 mb-6" />
                            <h2 className="text-3xl font-black text-white mb-4">شەڕی پەنجەکان ⚔️</h2>
                            <p className="text-lg text-slate-300 mb-8">چەند کەسن؟ خێرا پەنجە بنێ بە بەشەکەی خۆتدا تا ٥٠ جار!</p>
                            
                            <div className="flex flex-wrap justify-center gap-2 mb-8 w-full">
                                {[2, 3, 4, 5, 6].map(num => (
                                    <button key={num} onClick={() => setPlayerCount(num)} className={`py-3 px-6 rounded-xl font-bold transition-all ${playerCount === num ? 'bg-blue-500 text-white scale-110' : 'bg-slate-700 text-slate-300'}`}>
                                        {num} کەس
                                    </button>
                                ))}
                            </div>
                            <button onClick={startGame} className="w-full bg-blue-500 text-white text-2xl font-black py-4 rounded-2xl">دەستپێکردن</button>
                            <button onClick={onBack} className="mt-4 text-white/50 font-bold underline">گەڕانەوە بۆ سەرەتا</button>
                        </div>
                    )}

                    {view === 'PLAYING' && (
                        <div className={`w-full h-full grid ${gridClass} gap-1 bg-white/20`}>
                            {Array.from({length: playerCount}).map((_, i) => (
                                <div key={i} onPointerDown={(e) => { e.preventDefault(); handleTap(i); }} className={`relative flex items-center justify-center cursor-pointer select-none overflow-hidden ${colors[i]} ${activeColors[i]}`}>
                                    <div className="absolute bottom-0 left-0 w-full bg-black/30 transition-all duration-75" style={{ height: `${(scores[i] / winScore) * 100}%` }}></div>
                                    <div className="z-10 flex flex-col items-center">
                                        <span className="text-lg font-bold text-black/50 mb-1">یاریزانی {i+1}</span>
                                        <span className="text-5xl font-black text-white">{scores[i]}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'GAME_OVER' && winner !== null && (
                        <div className="absolute inset-0 z-30 bg-black/80 flex flex-col justify-center items-center p-8 text-center">
                            <Trophy size={80} className="text-yellow-400 mb-6" />
                            <h2 className="text-5xl font-black text-white mb-2">یاریزانی {winner + 1}</h2>
                            <h3 className="text-3xl text-yellow-400 font-bold mb-8">بردییەوە! 🎉</h3>
                            <button onClick={startGame} className="w-full bg-white text-black text-xl font-black py-4 rounded-2xl mb-4">دووبارە</button>
                            <button onClick={onBack} className="w-full bg-slate-800 text-white text-xl font-black py-4 rounded-2xl">مێنۆ</button>
                        </div>
                    )}
                </div>
            );
        }

        // یاری نوێ: وێنەکێشان (Draw It)
        function DrawItGame({ onBack }) {
            const [view, setView] = useState('HOME');
            const [word, setWord] = useState('');
            const [timeLeft, setTimeLeft] = useState(60);

            useEffect(() => {
                let timer;
                if (view === 'PLAYING' && timeLeft > 0) timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                else if (timeLeft === 0 && view === 'PLAYING') setView('GAME_OVER');
                return () => clearInterval(timer);
            }, [view, timeLeft]);

            const startGame = () => {
                setWord(DRAWING_WORDS[Math.floor(Math.random() * DRAWING_WORDS.length)]);
                setTimeLeft(60);
                setView('PLAYING');
            };

            return (
                <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20">
                    <div className="p-4 bg-black/20 flex justify-between items-center border-b border-white/10">
                        <h2 className="text-2xl font-black text-blue-400">وێنەکێشان</h2>
                        <button onClick={onBack} className="bg-white/10 p-2 rounded-xl text-white"><Home size={24} /></button>
                    </div>

                    {view === 'HOME' && (
                        <div className="p-8 text-center text-white">
                            <Palette size={80} className="text-blue-400 mb-6 mx-auto" />
                            <p className="text-lg text-blue-100 mb-8">کاغەز و قەڵەمێک بهێنە. وشەیەک دەردەچێت، تەنها وێنەی بکێشە با هاوڕێکانت بیزانن (قسەکردن قەدەغەیە!).</p>
                            <button onClick={startGame} className="w-full bg-blue-500 text-white text-2xl font-black py-4 rounded-2xl">دەستپێکردن</button>
                        </div>
                    )}

                    {view === 'PLAYING' && (
                        <div className="p-8 text-center">
                            <div className="text-yellow-300 font-black text-4xl mb-8">{timeLeft} ⏱️</div>
                            <p className="text-white text-xl mb-4">وێنەی ئەمە بکێشە:</p>
                            <h2 className="text-6xl font-black text-blue-300 mb-12">{word}</h2>
                            <button onClick={() => setView('GAME_OVER')} className="w-full bg-green-500 text-white text-xl font-bold py-4 rounded-2xl">زانیان! (تەواو)</button>
                        </div>
                    )}

                    {view === 'GAME_OVER' && (
                        <div className="p-8 text-center text-white">
                            <h2 className="text-4xl font-black mb-8">کاتی وێنەکێشان تەواو بوو!</h2>
                            <button onClick={startGame} className="w-full bg-blue-500 py-4 rounded-2xl font-bold text-xl">یارییەکی تر</button>
                        </div>
                    )}
                </div>
            );
        }

        // یاری نوێ: کێ باشتر دەمناسێت؟ (Who Knows Me Best)
        function WhoKnowsMeGame({ onBack }) {
            const [prompt, setPrompt] = useState('');

            const nextQuestion = () => {
                setPrompt(WHO_KNOWS_ME_PROMPTS[Math.floor(Math.random() * WHO_KNOWS_ME_PROMPTS.length)]);
            };

            useEffect(() => { nextQuestion(); }, []);

            return (
                <div className="w-full max-w-2xl bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20">
                    <div className="p-4 bg-black/20 flex justify-between items-center border-b border-white/10">
                        <h2 className="text-2xl font-black text-indigo-400">کێ باشتر دەمناسێت؟</h2>
                        <button onClick={onBack} className="bg-white/10 p-2 rounded-xl text-white"><Home size={24} /></button>
                    </div>
                    <div className="p-8 text-center text-white flex flex-col justify-center min-h-[400px]">
                        <UserCircle size={80} className="text-indigo-400 mb-6 mx-auto" />
                        <p className="text-indigo-200 font-bold mb-4">مۆبایلەکە بدە بە کەسێک، با ئەم پرسیارە لەوانی تر بکات بزانێت کێ دەیانزانێت!</p>
                        <div className="bg-black/30 p-8 rounded-3xl mb-8 border border-white/10">
                            <h2 className="text-3xl font-black text-yellow-300">{prompt}</h2>
                        </div>
                        <button onClick={nextQuestion} className="w-full bg-indigo-500 py-4 rounded-2xl font-bold text-xl">پرسیاری داهاتوو</button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // مێنۆی سەرەکی (Main Menu)
        // ==========================================
        function App() {
            const [activeApp, setActiveApp] = useState('MENU');

            if (activeApp === 'IMPOSTER') return <div className="min-h-screen flex items-center justify-center p-4"><ImposterGame onBack={() => setActiveApp('MENU')} /></div>;
            if (activeApp === 'TIMEBOMB') return <div className="min-h-screen flex items-center justify-center p-4"><TimeBombGame onBack={() => setActiveApp('MENU')} /></div>;
            if (activeApp === 'FINGERBATTLE') return <div className="min-h-screen flex items-center justify-center p-4"><FingerBattleGame onBack={() => setActiveApp('MENU')} /></div>;
            if (activeApp === 'DRAWIT') return <div className="min-h-screen flex items-center justify-center p-4"><DrawItGame onBack={() => setActiveApp('MENU')} /></div>;
            if (activeApp === 'WHOKNOWSME') return <div className="min-h-screen flex items-center justify-center p-4"><WhoKnowsMeGame onBack={() => setActiveApp('MENU')} /></div>;

            // بۆ کورتی کۆدەکە لێرەدا دەتوانین یارییەکانی تریش بخەینە خوارەوە بەڵام لەبەر سادەیی کورتکراوەتەوە (وەک Taboo و Charades کە لە پێشتردا هەبوون). بۆ ئەوەی کۆدەکە زۆر درێژ نەبێتەوە.

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-purple-900 to-slate-900 font-sans p-4 flex flex-col items-center justify-center">
                    
                    <div className="text-center mb-10 mt-8">
                        <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-pink-500 mb-4 drop-shadow-lg">
                            مەرکەزی یارییەکان
                        </h1>
                        <p className="text-purple-200 text-xl font-bold">پڕ لە یاری خۆش بۆ خێزان و هاوڕێیان! 🎉</p>
                    </div>

                    {/* گریدەکە کراوە بە ٤ کۆڵۆم لە شاشەی گەورە تا ٩ یارییەکە جوان دەربکەون */}
                    <div className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-10">
                        
                        <button onClick={() => setActiveApp('IMPOSTER')} className="group bg-white/10 backdrop-blur-md border border-white/20 hover:border-pink-500 p-6 rounded-3xl text-center transition-all hover:scale-105">
                            <div className="w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:rotate-12 transition-transform"><Users className="text-white" /></div>
                            <h2 className="text-xl font-black text-white mb-2">کێ فێڵبازە؟</h2>
                            <p className="text-purple-200 text-xs font-bold">فێڵبازەکە بدۆزەرەوە!</p>
                        </button>

                        <button onClick={() => setActiveApp('TIMEBOMB')} className="group bg-white/10 backdrop-blur-md border border-white/20 hover:border-red-500 p-6 rounded-3xl text-center transition-all hover:scale-105">
                            <div className="w-16 h-16 bg-gradient-to-br from-red-500 to-orange-600 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:-rotate-12 transition-transform"><Bomb className="text-white" /></div>
                            <h2 className="text-xl font-black text-white mb-2">بۆمبی کاتژمێری</h2>
                            <p className="text-purple-200 text-xs font-bold">خێرا بڵێ پێش تەقینەوە!</p>
                        </button>

                        <button onClick={() => setActiveApp('FINGERBATTLE')} className="group bg-white/10 backdrop-blur-md border border-white/20 hover:border-blue-500 p-6 rounded-3xl text-center transition-all hover:scale-105 relative overflow-hidden">
                            <div className="absolute top-0 right-0 bg-blue-500 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg">٦ کەسی</div>
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-400 to-cyan-600 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:rotate-12 transition-transform"><Hand className="text-white" /></div>
                            <h2 className="text-xl font-black text-white mb-2">شەڕی پەنجەکان</h2>
                            <p className="text-purple-200 text-xs font-bold">کێ خێراترە؟ (٢ بۆ ٦ کەس)</p>
                        </button>

                        <button onClick={() => setActiveApp('DRAWIT')} className="group bg-white/10 backdrop-blur-md border border-white/20 hover:border-blue-400 p-6 rounded-3xl text-center transition-all hover:scale-105 relative overflow-hidden">
                            <div className="absolute top-0 right-0 bg-yellow-400 text-black text-[10px] font-bold px-2 py-1 rounded-bl-lg">نوێ</div>
                            <div className="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:-rotate-12 transition-transform"><Palette className="text-white" /></div>
                            <h2 className="text-xl font-black text-white mb-2">وێنەکێشان</h2>
                            <p className="text-purple-200 text-xs font-bold">وێنەی بکێشە با بیزانن!</p>
                        </button>

                        <button onClick={() => setActiveApp('WHOKNOWSME')} className="group bg-white/10 backdrop-blur-md border border-white/20 hover:border-indigo-400 p-6 rounded-3xl text-center transition-all hover:scale-105 relative overflow-hidden">
                            <div className="absolute top-0 right-0 bg-yellow-400 text-black text-[10px] font-bold px-2 py-1 rounded-bl-lg">نوێ</div>
                            <div className="w-16 h-16 bg-gradient-to-br from-indigo-400 to-purple-600 rounded-2xl flex items-center justify-center mb-4 mx-auto group-hover:rotate-12 transition-transform"><UserCircle className="text-white" /></div>
                            <h2 className="text-xl font-black text-white mb-2">کێ باشتر دەمناسێت؟</h2>
                            <p className="text-purple-200 text-xs font-bold">بزانە هاوڕێکانت چەند دەتناسن.</p>
                        </button>

                        {/* تێبینی: دەتوانیت لێرەدا یارییەکانی تری وەک Taboo و بێدەنگ! زیاد بکەیتەوە ئەگەر حەزت لێ بوو */}
                        <div className="group bg-white/5 border border-white/10 p-6 rounded-3xl text-center flex flex-col items-center justify-center opacity-50">
                            <h2 className="text-xl font-black text-white mb-2">یاری تریش لە ڕێگایە...</h2>
                            <p className="text-purple-200 text-xs font-bold">بەردەوام نوێ دەکرێتەوە</p>
                        </div>

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
